<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Babycrafts Atelier Pro</title>
    
    <link rel="icon" href="https://static.wixstatic.com/media/067fe5_b42b4a03e7b24bb2a401f6d9e8df9284~mv2.png">
    <link rel="apple-touch-icon" href="https://static.wixstatic.com/media/067fe5_b42b4a03e7b24bb2a401f6d9e8df9284~mv2.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a',
                            300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b',
                            600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* PIN Dots */
        .pin-dot {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .pin-dot.filled {
            background: #f59e0b;
            border-color: #f59e0b;
        }
        
        /* PIN Keys */
        .pin-key, #pinBackspace {
            cursor: pointer;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        
        /* Side Menu */
        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            background: white;
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            box-shadow: 4px 0 24px rgba(0,0,0,0.1);
        }
        .side-menu.open { transform: translateX(0); }
        
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.visible { opacity: 1; pointer-events: auto; }
        
        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        .bottom-sheet.active { pointer-events: auto; }
        
        .bottom-sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .bottom-sheet.active .bottom-sheet-backdrop { opacity: 1; }
        
        .bottom-sheet-content {
            position: relative;
            margin-top: auto;
            background: white;
            border-radius: 24px 24px 0 0;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .bottom-sheet.active .bottom-sheet-content { transform: translateY(0); }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 16px;
            right: 16px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
    
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" class="fixed inset-0 bg-white z-50 flex flex-col">
        <!-- Header -->
        <div class="flex-1 flex flex-col items-center justify-center px-8">
            <div class="w-24 h-24 bg-primary-100 rounded-3xl flex items-center justify-center mb-6">
                <svg class="w-12 h-12 text-primary-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                </svg>
            </div>
            
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Babycrafts</h1>
            <p class="text-gray-500 mb-8">Atelier Pro V3</p>
            
            <!-- PIN Display -->
            <div class="flex gap-4 mb-8">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            
            <p id="pinError" class="text-red-500 text-sm mb-6 hidden">Ongeldige PIN code</p>
            
            <!-- Keypad -->
            <div class="grid grid-cols-3 gap-4">
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('1')">1</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('2')">2</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('3')">3</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('4')">4</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('5')">5</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('6')">6</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('7')">7</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('8')">8</button>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('9')">9</button>
                <div class="w-16 h-16"></div>
                <button type="button" class="pin-key w-16 h-16 rounded-2xl bg-gray-100 text-xl font-semibold active:bg-gray-200 transition-colors" onclick="pinDigit('0')">0</button>
                <button type="button" onclick="pinBackspace()" class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center active:bg-gray-200 transition-colors">
                    <i data-lucide="delete" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
        
        <div class="p-6 text-center text-sm text-gray-400">
            © 2024 Babycrafts Atelier
        </div>
    </div>
    
    <!-- ==================== MAIN APP ==================== -->
    <div id="mainApp" class="hidden min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="bg-white safe-top sticky top-0 z-30 border-b border-gray-100">
            <div class="flex items-center justify-between px-4 py-3">
                <button onclick="UI.openMenu()" class="p-2 -ml-2 hover:bg-gray-100 rounded-xl">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                
                <h1 id="pageTitle" class="text-lg font-semibold">Dashboard</h1>
                
                <button onclick="App.showNewOrderForm()" class="p-2 -mr-2 bg-primary-100 text-primary-600 rounded-xl hover:bg-primary-200 transition-colors">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>
        </header>
        
        <!-- Main Content -->
        <main id="mainContent" class="flex-1 overflow-y-auto pb-24">
            <!-- Content wordt hier geladen -->
        </main>
        
        
        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 safe-bottom z-30">
            <div class="flex items-center justify-around px-2 py-2">
                <button onclick="App.navigate('dashboard')" data-page="dashboard" class="nav-item flex flex-col items-center gap-1 p-2 text-amber-600">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="text-xs">Home</span>
                </button>
                
                <button onclick="App.navigate('orders')" data-page="orders" class="nav-item flex flex-col items-center gap-1 p-2 text-gray-400">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    <span class="text-xs">Orders</span>
                </button>
                
                <button onclick="App.navigate('nazorg')" data-page="nazorg" class="nav-item flex flex-col items-center gap-1 p-2 text-gray-400">
                    <i data-lucide="heart-handshake" class="w-5 h-5"></i>
                    <span class="text-xs">Nazorg</span>
                </button>
                
                <button onclick="App.navigate('archief')" data-page="archief" class="nav-item flex flex-col items-center gap-1 p-2 text-gray-400">
                    <i data-lucide="archive" class="w-5 h-5"></i>
                    <span class="text-xs">Archief</span>
                </button>
            </div>
        </nav>
    </div>
    
    
    <!-- ==================== SIDE MENU ==================== -->
    <div id="menuOverlay" class="menu-overlay" onclick="UI.closeMenu()"></div>
    
    <aside id="sideMenu" class="side-menu">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-xl font-bold">Babycrafts</h2>
            <p class="text-sm text-gray-500">Atelier Pro</p>
        </div>
        
        <nav class="p-4 space-y-1">
            <button onclick="App.navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </button>
            
            <button onclick="App.navigate('orders')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-colors">
                <i data-lucide="package" class="w-5 h-5"></i>
                <span>Alle Orders</span>
            </button>
            
            <button onclick="App.navigate('nazorg')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-colors">
                <i data-lucide="heart-handshake" class="w-5 h-5"></i>
                <span>Nazorg</span>
            </button>
            
            <button onclick="App.navigate('archief')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-colors">
                <i data-lucide="archive" class="w-5 h-5"></i>
                <span>Archief</span>
            </button>
            
            <hr class="my-4 border-gray-100">
            
            <button onclick="App.navigate('settings')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Instellingen</span>
            </button>
        </nav>
    </aside>
    
    
    <!-- ==================== BOTTOM SHEET ==================== -->
    <div id="bottomSheet" class="bottom-sheet">
        <div id="bottomSheetBackdrop" class="bottom-sheet-backdrop"></div>
        <div id="bottomSheetContent" class="bottom-sheet-content">
            <!-- Content wordt hier geladen -->
        </div>
    </div>
    
    
    <!-- ==================== TOAST CONTAINER ==================== -->
    <div id="toastContainer" class="toast-container flex flex-col gap-2"></div>
    
    
    <!-- ==================== SCRIPTS ==================== --
    >
    <script src="js/app.js"></script>
</body>
</html>
